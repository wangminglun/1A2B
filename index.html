<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="1A2B 猜數字 — 單人模式，4 位不重複數字，線上即玩">
  <title>1A2B 猜數字</title>
  <meta property="og:type" content="website">
  <meta property="og:title" content="1A2B 猜數字">
  <meta property="og:description" content="猜出 4 位不重複密碼，最多 10 次機會，挑戰你的邏輯推理力！">
  <meta property="og:image" content="https://wangminglun.github.io/1A2B/og-image.jpg">
  <meta property="og:url" content="https://wangminglun.github.io/1A2B/">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <main class="shell">
    <header class="hero">
      <p class="badge">ONLINE · 單人模式</p>
      <h1 class="title">
        <span class="title-a">1</span><span class="title-b">A</span><span class="title-num">2</span><span class="title-b">B</span>
      </h1>
      <p class="subtitle">猜出 4 位不重複密碼 · 最多 10 次機會</p>
      <p class="rules">xAyB：A 數字位置都對 · B 數字對但位置錯</p>
    </header>

    <section class="panel glass">
      <div class="panel-head">
        <h2>猜測紀錄</h2>
        <div class="attempt-meter" id="attemptMeter" aria-label="剩餘次數"></div>
      </div>

      <ol class="history" id="history" aria-live="polite"></ol>
      <p class="history-empty" id="historyEmpty">輸入 4 位數字開始挑戰</p>

      <div class="guess-row" id="guessRow">
        <label class="sr-only" for="guessInput">輸入 4 位猜測</label>
        <form class="guess-inline" id="guessForm">
          <input
            id="guessInput"
            class="guess-input"
            type="text"
            inputmode="numeric"
            autocomplete="off"
            maxlength="4"
            placeholder="????"
            spellcheck="false"
          >
          <output class="guess-result" id="guessResult" aria-live="polite"></output>
          <button type="submit" class="btn btn-submit" id="submitBtn">送出</button>
        </form>
        <p class="feedback" id="feedback" role="status"></p>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-primary" id="restartBtn">重新開始</button>
      </div>
    </section>

    <footer class="footer">電腦已藏好密碼 · 祝你好運</footer>
  </main>

  <div class="overlay hidden" id="overlay">
    <div class="modal glass" id="modal">
      <p class="modal-emoji" id="modalEmoji">🎉</p>
      <h3 id="modalTitle">恭喜破關！</h3>
      <p id="modalText"></p>
      <button type="button" class="btn btn-primary" id="modalBtn">再玩一次</button>
    </div>
  </div>

  <canvas class="confetti" id="confetti" aria-hidden="true"></canvas>

  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
